                    example: EUR
  /le#filteredDelays:
    post:
      tags:
        - Live Data
      summary: Filtered Live Train Positions
      operationId: filteredDelays
      description: |-
        Like `delaysQuery` but with boolean filters for vehicle types.
        Filters: `filterTrain` (Leo Express trains), `filterBus` (buses), `filterMinibus`,
        `filterOrlickoTrain` (Orlicko regional trains), `filterPodunTrain` (Podunajsko regional trains).
        Returns the same delay/GPS data structure.
      parameters:
        - $ref: '#/components/parameters/ContentType'
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: 'query filteredDelaysQuery($filterTrain: Boolean, $filterBus: Boolean, $filterMinibus: Boolean, $filterOrlickoTrain: Boolean, $filterPodunTrain: Boolean, $locale: String) { filteredDelays(filters: {filterTrain: $filterTrain, filterBus: $filterBus, filterMinibus: $filterMinibus, filterOrlickoTrain: $filterOrlickoTrain, filterPodunTrain: $filterPodunTrain}, locale: $locale) { line_short line_name ride_id from from_st to to_st conf conf_st lat lng gps_time speed bearing acceleration departure_delay delay reservation stops { station_id station_name platform track } ride { stops { arrival departure station { id name } } } } }'
              variables:
                filterTrain: true
                filterBus: false
                filterMinibus: false
                filterOrlickoTrain: true
                filterPodunTrain: true
                locale: de
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      filteredDelays:
                        type: array
                        items:
                          $ref: '#/components/schemas/DelayInfo'
