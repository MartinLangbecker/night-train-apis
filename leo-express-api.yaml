  /le#orderPaymentMethodsExt:
    post:
      tags:
        - Payment
      summary: Available Payment Methods
      operationId: orderPaymentMethodsExt
      description: |-
        Returns available payment methods for a specific order. Requires the `digest` token
        returned when the order was created via `/api/order/process-order`.

        Known payment methods:
        - id:32 — Google Pay
        - id:101 — Bankomatkarte / PAYMENT_CARD
        - id:134 — Bank transfer / BANK_ACCOUNT
        - id:143 — Apple Pay
        - id:144 — Kryptowährungen / BITCOIN
      parameters:
        - $ref: '#/components/parameters/ContentType'
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: 'query allowedPaymentMethodsExtQuery($order: String, $user: String, $token: String, $digest: String, $locale: String, $platform: String) { orderPaymentMethodsExt(order: $order, digest: $digest, token: $token, user: $user, locale: $locale, platform: $platform) { available_methods { description_lng id image name_lng subtype type currency amount allow_combined combined_amount combined_leo_amount co2compensation show_on_click } error { code message } } }'
              variables:
                order: '261709449551281'
                digest: base64encodedDigestToken==
                user: null
                token: null
                locale: de
                platform: null
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      orderPaymentMethodsExt:
                        type: object
                        properties:
                          available_methods:
                            type: array
                            items:
                              $ref: '#/components/schemas/PaymentMethod'
                          error:
                            $ref: '#/components/schemas/Error'
  /le#getAvailableOrderServices:
    post:
      tags:
        - Booking
      summary: Order Add-on Services
      operationId: getAvailableOrderServices
      description: |-
        Returns available add-on services for an existing order (e.g. extra luggage, meals, bicycle).
        Each service has pricing, capacity, and optional validity periods.
      parameters:
        - $ref: '#/components/parameters/ContentType'
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: 'query getAvailableOrderServicesQuery($order_code: String, $locale: String, $token: String, $platform: String) { getAvailableOrderServices(order_code: $order_code, locale: $locale, token: $token, platform: $platform) { items { order_item services { id name short capacity price external show_detail deleted_at validity { from to } pdf } } error { code message } } }'
              variables:
                order_code: '261709449551281'
                locale: de
                token: null
                platform: null
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      getAvailableOrderServices:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/OrderServiceItem'
                          error:
                            $ref: '#/components/schemas/Error'
  /le#prolongOrder:
    post:
      tags:
        - Booking
      summary: Extend Order Timer
      operationId: prolongOrder
      description: |-
        Extends the validity timer of an unpaid order by the specified number of minutes.
        Orders have a limited window to complete payment before being cancelled.
      parameters:
        - $ref: '#/components/parameters/ContentType'
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: 'mutation prolongOrderMutation($order_code: String, $minutes: Int, $locale: String, $token: String, $platform: String) { prolongOrder(order_code: $order_code, minutes: $minutes, locale: $locale, token: $token, platform: $platform) { success error { code message } } }'
              variables:
                order_code: '261709449551281'
                minutes: 15
                locale: de
                token: null
                platform: null
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      prolongOrder:
                        type: object
                        properties:
                          success:
                            type: boolean
                            example: true
                          error:
                            $ref: '#/components/schemas/Error'
  /le#createOrder:
    post:
      tags:
        - Booking
      summary: Create Order (GraphQL)
      operationId: createOrder
      description: |-
        Creates a new order from a connection hash. This is the preferred method over the REST
        `/api/order/process-order` endpoint, which requires browser session cookies.

        The `input.classCombination` array specifies which class to book for each line (leg) in
        multi-leg connections. For single-leg connections, one entry suffices.

        Returns the order with `code`, `digest` (for payment queries), and assigned tickets with seats.
      parameters:
        - $ref: '#/components/parameters/ContentType'
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: 'mutation createOrder($input: OrderInput, $affiliate_code: String, $locale: String, $platform: String) { createOrder(input: $input, affiliate_code: $affiliate_code, locale: $locale, platform: $platform) { order { id code digest valid price finished order_items { id code tickets { id line { short name } class_id seat { id name short_name class_id class_short } station_from { id name } station_to { id name } } } } error { code message } } }'
              variables:
                input:
                  hash: c36bc540e222639be02de0ab08344c1f
                  class: '7'
                  classCombination:
                    - line: LE235
                      class: '7'
                locale: de
                platform: website
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      createOrder:
                        $ref: '#/components/schemas/OrderResponse'
              example:
                data:
                  createOrder:
                    order:
                      id: '43663293'
                      code: '261991397251110'
                      digest: eTdxaEFFRmZZWHFzdDYxSGpiS3h3N29kcDhIK0Vqb1V1cVgzeUtCTm5WTT0=
                      valid: true
                      price: 37.5
                      finished: false
                      order_items:
                        - id: '65240913'
                          code: '262930175429338'
                          tickets:
                            - id: '65983747'
                              line:
                                short: LE235
                                name: LE235
                              class_id: 8
                              seat:
                                id: '18913'
                                name: '17'
                                short_name: 1/17
                                class_id: 8
                                class_short: ECOSLEEPERLADY
                              station_from:
                                id: '8010366'
                                name: Weimar
                              station_to:
                                id: '5102825'
                                name: Przemyśl Zasanie
                    error: null
  /le#deleteOrder:
    post:
      tags:
        - Booking
      summary: Delete/Cancel Order
      operationId: deleteOrder
      description: |-
        Cancels and deletes an unpaid order. Can optionally specify specific items to cancel
        (partial cancellation) via the `items` array.
      parameters:
        - $ref: '#/components/parameters/ContentType'
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: 'mutation deleteOrder($order_code: String, $items: [String], $locale: String, $token: String, $platform: String) { deleteOrder(order_code: $order_code, items: $items, locale: $locale, token: $token, platform: $platform) { success error { code message } } }'
              variables:
                order_code: '261991397251110'
                items: null
                locale: de
                token: null
                platform: null
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      deleteOrder:
                        type: object
                        properties:
                          success:
                            type: boolean
                          error:
                            $ref: '#/components/schemas/Error'
  /le#orderData:
