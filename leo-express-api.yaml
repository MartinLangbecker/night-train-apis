    PersonArgument:
      type: object
      description: |-
        Passenger type definition. Known types:
        - adult: Standard adult
        - child: Junior 6–17 years (50% discount in CZ Economy only; 25% cashback outside CZ for Smile Club)
        - pram: Infant in pram (free)
        - child6: Child 0–5 years (100% free in CZ all classes; no discount outside CZ)
        - student: Student up to 25 (50% in CZ Economy; 25% cashback outside CZ). ISIC required 15+.
        - senior: Senior 65+ (50% in CZ Economy; 25% cashback outside CZ)

        International routes: 50% discount applies proportionally to CZ route portion only.
        Example: 50% CZ + 50% abroad = 25% total discount.
        - student: Student
        - senior: Senior
      properties:
        name:
          type: string
          enum: [adult, child, pram, child6, student, senior]
          example: adult
        cards:
          type: array
          description: |-
            Discount card codes. Known values:
            - isic: Student/Lehrer (ISIC)
            - interrailbus: Interrail/Eurail 1. Klasse
            - interraileco: Interrail/Eurail 2. Klasse
            - handicap3: Behinderte des 3. Grades
            - wheel: ZTP Person mit Rollstuhl
            - ztpwheelp: ZTP Person mit Rollstuhl und Begleitung
            - ztpandp: ZTP Person mit Begleitung
            - ztpanddog: ZTP Person mit Assistenzhund
            - wheelsk: ŤZP Rollstuhl
            - tzp: ŤZP Ausweis (Basis)
            - tzpwheelp: ŤZP mit Rollstuhl und Behindertenführer
            - tzpandp: ŤZP mit Behindertenführer

            Rules:
            - ZTP/ZTP-P (Czech): 75% discount, Economy class only, Czech routes only. Companion rides free.
            - ŤZP/ŤZP-S (Slovak): 0% fare discount, but 25% cashback in Leo Credits (Economy, entire route).
            - Wheelchair transported free of charge.
            - Companion OR assistance dog, not both simultaneously.
          items:
            type: string
            enum: [isic, interrailbus, interraileco, handicap3, wheel, ztpwheelp, ztpandp, ztpanddog, wheelsk, tzp, tzpwheelp, tzpandp]
          example: []
    ServiceArgument:
      type: object
      description: |-
        Service request. Known service IDs:
        - "4": Bicycle (count=1 to request, count=0 to skip)
      properties:
        service_id:
          type: string
          example: '4'
        count:
          type: integer
          description: Number of this service requested
          example: 1
