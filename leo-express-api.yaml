  /api/order/process-order:
    post:
      tags:
        - Booking
      summary: Create Order
      operationId: processOrder
      description: |-
        Creates a new order from a connection hash returned by `searchConnections`.
        The response includes `order_code` and `digest` (base64 token) needed for subsequent
        booking operations (seat selection, payment methods, finalization).

        The `classes` object maps line names to the selected class and price.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - hash
                - classes
              properties:
                hash:
                  type: string
                  description: Connection hash from searchConnections response
                  example: c36bc540e222639be02de0ab08344c1f
                group:
                  type: string
                  description: JSON-encoded group booking info
                  example: '{"classId":"","active":false,"name":"","code":""}'
                classes:
                  type: string
                  description: JSON-encoded class selection per line
                  example: '{"LE235":{"price":103.3,"classId":"3","promo":0,"name":"Economy","code":"economy","standing":false,"kontentHash":"economy_train_ric"}}'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessOrderResponse'
              example:
                error: null
                order:
                  id: '43644505'
                  code: '261709449551281'
                  digest: ZXhhbXBsZURpZ2VzdFRva2VuPT0=
                  valid: true
                  price: 103.3
                  finished_at: ''
                  finished: false
                  order_items:
                    - ticket_id: '65954563'
                      line: LE235
                      class_id: 3
                      class_name: Economy
  /api/seats/change:
    post:
      tags:
        - Seats
      summary: Change Seat Assignment
      operationId: seatsChange
      description: |-
        Changes seat assignments for tickets in an order. Each ticket can be assigned to a
        specific seat in a specific car. The `scheme` field indicates the car type (e.g. `"ric"` for
        RIC international coaches).
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - tickets
              properties:
                tickets:
                  type: string
                  description: JSON array of seat assignment objects
                  example: '[{"ticketId":"65954563","id":18928,"name":"32","car_id":161,"originalSeatId":18922,"originalSeatName":26,"class_id":7,"class_name":"economy sleeper","scheme":"ric","cateringStatus":"allowed"}]'
                locale:
                  type: string
                  example: de
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  order:
                    type: string
                    description: Order code
                    example: '261657961965732'
                  error:
                    $ref: '#/components/schemas/Error'
  /api/order/retrieve:
    get:
      tags:
        - Booking
      summary: Retrieve Current Order
      operationId: orderRetrieve
      description: Retrieves the current order for the active session. Requires session cookie.
