      parameters:
        - in: query
          name: locale
          schema:
            type: string
          example: de
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
  /api/user/retrieve:
    get:
