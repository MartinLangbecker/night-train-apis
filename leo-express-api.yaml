openapi: 3.0.0
info:
  title: Leo Express API
  version: 1.0.0
  description: |-
    Booking API for [leoexpress.com](https://www.leoexpress.com), including:
    - Connection search with multi-class pricing (Business, Economy, Economy Plus, Premium, Economy Sleeper, Economy Sleeper Lady)
    - Live train positions with GPS coordinates, speed, bearing, and delay data
    - Station database with GPS coordinates (189 stations across CZ, PL, SK, DE, LT, LV, ET, UA)
    - Carrier and route metadata
    - Full booking flow via GraphQL (search → createOrder → seat selection → payment)
    - Seat map with car layouts (base64 SVG) and free seat lists
    - Tariff system with 98 discount types (ZTP, ŤZP, Interrail, Polish ULGA, family, group, corporate)
    - 8 add-on services (bicycle, ski, dog, parking, seat reservation, thermal pass)
    - 30 on-board facility types (WiFi, power, AC, steward, sleep set, catering)
    - Timetable data with calendar validity and exception days
    - Time ticket (pass) pricing
    - Order management (prolong, add-on services, reseat, refund)
    - Night train LE235: Frankfurt (Main) Süd → Przemyśl Główny (overnight, 1193 km)

    ## Architecture

    The API consists of two parts:
    - **GraphQL** endpoint at `https://graph.leoexpress.com/le` — full API with 60+ queries and 50+ mutations
    - **REST** endpoints at `https://www.leoexpress.com/api` — session management and legacy order processing

    The GraphQL endpoint supports full introspection (`__schema` queries).

    ## Authentication

    Search, carriers, delays, stations, tariffs, services, and facility queries require no authentication.
    Booking operations use an `order_code` + `digest` (base64 token) pair returned when creating an order.
    User account operations require a `token` from the `loginUser` mutation.

    ## Station Identifiers

    Stations can be referenced by:
    - EVA numbers (e.g. `8010366` = Weimar, `8002041` = Frankfurt (Main) Süd)
    - Internal string codes (e.g. `PRZEMYSL`, `PRAHA`, `LEIPZIG`, `DRESDEN`)
    - Internal numeric codes (e.g. `5434124` = Praha hl.n., `5102825` = Przemyśl Zasanie)

    The `stations` query returns all 189 stations with GPS coordinates.

    ## Booking Flow (GraphQL)

    1. `searchConnections` → returns connections with `hash` per connection
    2. `createOrder` mutation (hash + classCombination) → returns `order_code` + `digest`
    3. `carsWithFreeSeats` query (ticket_id) → seat map with free seats
    4. `changeSeat` mutation → assign specific seat
    5. `orderPaymentMethodsExt` query (digest) → available payment methods
    6. `bindOrderToUser` mutation → submit passenger email/name
    7. `getApplicationData` query → get application token for payment gateway
    8. `createGoPayPayment` mutation → get redirect URL to GoPay payment form
    9. User completes payment on GoPay → redirect back
    10. `verifyGoPayPayment` mutation → confirm payment status

    ## Booking Flow (REST, legacy)

    Steps 2–6 can alternatively use REST endpoints (`/api/order/process-order`, `/api/seats/change`,
    `/api/payment/choose-method`), but these require browser session cookies and are less reliable
    from API clients.

servers:
  - url: https://graph.leoexpress.com
    description: GraphQL API (all /le#... paths)
  - url: https://www.leoexpress.com
    description: REST API (all /api/... paths)
tags:
  - name: Search
    description: Connection search and route information
  - name: Stations
    description: Station database with GPS coordinates
  - name: Carriers
    description: Carrier metadata
  - name: Live Data
    description: Real-time train positions and delays
  - name: Timetables
    description: Static timetable data with calendar validity
  - name: Tariffs
    description: Passenger types and discount card definitions
  - name: Booking
    description: Order creation and management
  - name: Seats
    description: Seat maps and seat selection
  - name: Payment
    description: Payment methods and user cards
  - name: Pricing
    description: Minimum prices and time ticket pricing
  - name: Session
    description: Session and currency management

paths:
  /le#searchConnections:
    post:
      tags:
        - Search
      summary: Search Connections
      operationId: searchConnections
      description: |-
        Search for train/bus connections between two stations on a given date.
        Returns available connections with pricing per class, transfer info, and a `hash`
        per connection used to create an order.

        Station IDs can be EVA numbers (e.g. `8010366`), internal string codes (e.g. `PRZEMYSL`),
        or internal numeric codes (e.g. `5434124`).

        The `persons` array defines passenger composition. Each entry has a `name` (passenger type)
        and optional `cards` array for discount cards (e.g. `"interrailbus"`).

        The `services` array requests additional services (e.g. service_id `"4"` = bicycle).

        The optional `backride` variable specifies a return date (format `DD.MM.YYYY`) for round-trip searches.

        Additional undocumented parameters for GPS-based search:
        - `from_lat`, `from_lon`: GPS coordinates of origin (for door-to-door / D2D service)
        - `to_lat`, `to_lon`: GPS coordinates of destination
        - `from_address`, `to_address`: Address strings for D2D pickup/dropoff
      parameters:
        - $ref: '#/components/parameters/ContentType'
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: 'query searchConnections($from: String, $to: String, $date: String, $persons: [RateArgument], $services: [ServiceArgument], $currency: String, $timestamp: Int, $locale: String, $token: String, $platform: String) { searchResults(from: $from, to: $to, date: $date, persons: $persons, services: $services, currency: $currency, timestamp: $timestamp, locale: $locale, token: $token, platform: $platform) { return_msg search_msg { msg icon color_bg color_bg_icon station_from { id name } station_to { id name } } return_code date timestamp connections { origin { id name type translations { locale name } } destination { id name type translations { locale name } } departure departure_time { date timezone_type timezone } arrival arrival_time { date timezone_type timezone } origin_country destination_country traveltime totaltime distance lines { line_id origin destination departure arrival departure_time { date timezone_type timezone } arrival_time { date timezone_type timezone } distance type ride_id carrier_id line_stops { station { name_master country name translations { locale name } } } services { count capacity price service_id } info { facility { class_id values } delay { delay last_seen ride_id } notice { header message type type_id from to show_date } } classes { id short name kontent_hashtag } class_info { record_id capacity max_capacity standing occupied total basictotal groupTotal guaranted co2 cashback optimized is_promo rates { record_id price basicprice groupPrice count } passengers } line_obj { short name type carrier_id carrier { id name label } transport_type info { facilities { class_id values } name_required } } scheme } transfers { id distance time type subtype station_from { id name } station_to { id name } line_from line_to area { short name country timezone } } classes { id short name } class_info { record_id capacity max_capacity standing total basictotal groupTotal guaranted co2 cashback optimized is_promo rates { price basicprice groupPrice count } passengers } top_combination { total basictotal lines { line class_id short name } } msg currency hash d2d_info { dropoff pickup } } error { code message } } }'
              variables:
                date: '08.08.2026'
                from: '8010366'
                to: PRZEMYSL
                persons:
                  - name: adult
                    cards: []
                  - name: child
                    cards: []
                  - name: pram
                    cards: []
                  - name: child6
                    cards: []
                  - name: student
                    cards: []
                  - name: senior
                    cards: []
                services:
                  - service_id: '4'
                    count: 1
                timestamp: 1784647696
                locale: de
                currency: EUR
                token: null
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      searchResults:
                        $ref: '#/components/schemas/SearchResults'
  /le#connectionInfo:
    post:
      tags:
        - Search
      summary: Batch Route Info
      operationId: connectionInfo
      description: |-
        Returns route metadata (transfers, duration, type) for multiple origin-destination pairs in a single request.
        The `batch` parameter is a base64-encoded JSON array of `[from, to]` pairs.

        Example decoded batch: `[["LEIPZIG",8002041],["PRAHA","LEIPZIG"],["LEIPZIG",8070003]]`
      parameters:
        - $ref: '#/components/parameters/ContentType'
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: 'query connectionInfoQuery($from: String, $to: String, $batch: String, $locale: String, $token: String, $platform: String) { connectionInfo(from: $from, to: $to, batch: $batch, locale: $locale, token: $token, platform: $platform) { data { from to transfers duration type } error { code message } } }'
              variables:
                from: null
                to: null
                batch: W1siTEVJUFpJRyIsODAwMjA0MV0sWyJQUkFIQSIsIkxFSVBaSUciXSxbIkxFSVBaSUciLDgwNzAwMDNdXQ==
                locale: de
                token: null
                platform: null
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      connectionInfo:
                        type: object
                        properties:
                          data:
                            type: array
                            items:
                              type: object
                              properties:
                                from:
                                  type: string
                                  example: LEIPZIG
                                to:
                                  type: string
                                  example: '8002041'
                                transfers:
                                  type: integer
                                  example: 0
                                duration:
                                  type: integer
                                  description: Duration in minutes
                                  example: 45
                                type:
                                  type: string
                                  example: train
                          error:
                            $ref: '#/components/schemas/Error'
  /le#stations:
    post:
      tags:
        - Stations
      summary: List All Stations
      operationId: stations
      description: |-
        Returns all 189 stations in the Leo Express network with GPS coordinates, country,
        type (train/bus), parent station grouping, and localized names.

        Countries: CZ (54), PL (51), SK (47), DE (25), LT (4), UA (4), ET (3), LV (1).
      parameters:
        - $ref: '#/components/parameters/ContentType'
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: 'query stations($locale: String, $token: String, $platform: String) { stations(locale: $locale, token: $token, platform: $platform) { id name name_master name_lng country gps_lat gps_lon type timezone parent_station { short name country timezone } priority deleted_at translations { locale name } } }'
              variables:
                locale: de
                token: null
                platform: null
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      stations:
                        type: array
                        items:
                          $ref: '#/components/schemas/Station'
  /le#ride:
    post:
      tags:
        - Timetables
      summary: Ride Detail
      operationId: rideGraphQL
      description: |-
        Returns detailed information about a specific ride including all stops with GPS coordinates,
        car composition, departure/arrival times, and distance per stop.

        The ride ID comes from search results (`lines[].ride_id`) or delay queries.
      parameters:
        - $ref: '#/components/parameters/ContentType'
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: 'query ride($id: Int, $locale: String, $token: String, $platform: String) { ride(id: $id, locale: $locale, token: $token, platform: $platform) { id date departure arrival capacity note line { short name type carrier_id carrier { id name label } transport_type } scheme stops { id arrival departure distance station { id name country gps_lat gps_lon } } cars { id name short_name classes order } } }'
              variables:
                id: 1077158
                locale: de
                token: null
                platform: null
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      ride:
                        $ref: '#/components/schemas/Ride'
  /le#tariffsArray:
    post:
      tags:
        - Tariffs
      summary: All Tariffs (Flat List)
      operationId: tariffsArray
      description: |-
        Returns all 98 tariff/passenger types as a flat list with discount rules, age ranges,
        ZTP eligibility, country restrictions, and subrates.

        Key tariff codes: adult, child, child6, student, senior, pram, isic, interrailbus,
        interraileco, ztp, ztpp, tzp, tzpp, wheel, family, group, smilebus.

        Polish ULGA discounts: ulga_33, ulga_37, ulga_51, ulga_78, ulga_95, ulga_100.
        Slovak Podunajsko tariffs: podunadult, podunchild, podunstudent, podunsenior, poduntzp.
      parameters:
        - $ref: '#/components/parameters/ContentType'
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: 'query tariffsArray($locale: String, $token: String, $platform: String) { tariffsArray(locale: $locale, token: $token, platform: $platform) { id short combine ztp_allowed ztp_child_allowed disable_for age_min age_max name_lng description_lng country lang selectable validity { from to } subrates { id short name_lng description_lng } show_type } }'
              variables:
                locale: de
                token: null
                platform: null
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      tariffsArray:
                        type: array
                        items:
                          $ref: '#/components/schemas/Tariff'
  /le#services:
    post:
      tags:
        - Tariffs
      summary: Available Services
      operationId: services
      description: |-
        Returns all available add-on services with IDs, names, capacity, and validity periods.

        Known services:
        - id=3: Ski transport (Nov-Dec)
        - id=4: Bicycle transport
        - id=5: Parking (Prague)
        - id=6: All-day bicycle transport
        - id=7: Dog transport
        - id=10: Seat reservation (free)
        - id=11: ThermalPass DS
        - id=12: Seat catering
      parameters:
        - $ref: '#/components/parameters/ContentType'
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: 'query services($locale: String, $token: String, $platform: String) { services(locale: $locale, token: $token, platform: $platform) { id name name_lng short capacity price external show_detail deleted_at validity { from to } pdf } }'
              variables:
                locale: de
                token: null
                platform: null
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      services:
                        type: array
                        items:
                          $ref: '#/components/schemas/Service'
  /le#facilities:
    post:
      tags:
        - Tariffs
      summary: On-board Facilities
      operationId: facilities
      description: |-
        Returns all 30 on-board facility/amenity types that can be referenced in class_info.

        Known facilities include: Steward (4), WiFi (5), Power outlets (6), AC (7),
        Child seats (8), Wheelchair access (9), Quiet zone (10), Extra legroom (11),
        Comfort seats (12), Toilet (13), Included refreshments (14), Premium menu (15),
        Free coffee (16), Paid coffee (17), Free water (18), Cold drinks (19),
        Newspaper (20), On-board ticket purchase (21), Reservation required (22),
        Children's area (23), Bicycle transport (24), Ski transport (25),
        Sleep set (26), Daily disinfected (27), D2D service (31), Free Prague parking (32).
      parameters:
        - $ref: '#/components/parameters/ContentType'
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: 'query facilities($locale: String, $token: String, $platform: String) { facilities(locale: $locale, token: $token, platform: $platform) { id name } }'
              variables:
                locale: de
                token: null
                platform: null
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      facilities:
                        type: array
                        items:
                          $ref: '#/components/schemas/Facility'
  /le#timetables:
    post:
      tags:
        - Timetables
      summary: Timetable Data
      operationId: timetables
      description: |-
        Returns timetable entries with line info, calendar validity (date range, weekdays,
        exception days), and station stops with arrival/departure times.

        The optional `type` filter can be: `train`, `bus`.
      parameters:
        - $ref: '#/components/parameters/ContentType'
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: 'query timetables($type: String, $locale: String, $token: String, $platform: String) { timetables(type: $type, locale: $locale, token: $token, platform: $platform) { line { name type carrier { id name } route { id name } } calendar { date_from date_to days exception_plus exception_minus } stations { station { id name country } name arrival_time departure_time distance can_in can_out exception } } }'
              variables:
                type: train
                locale: de
                token: null
                platform: null
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      timetables:
                        type: array
                        items:
                          $ref: '#/components/schemas/TimeTable'
  /le#carriers:
    post:
      tags:
        - Carriers
      summary: List Carriers
      operationId: carriers
      description: Returns all carriers operating on the Leo Express network.
      parameters:
        - $ref: '#/components/parameters/ContentType'
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: 'query carriers($locale: String, $token: String, $platform: String) { carriers(locale: $locale, token: $token, platform: $platform) { id name label spp } }'
              variables:
                locale: de
                token: null
                platform: null
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      carriers:
                        type: array
                        items:
                          $ref: '#/components/schemas/Carrier'
              example:
                data:
                  carriers:
                    - id: 1
                      name: Leo Express
                      label: Leo Express
                      spp: null
                    - id: 7
                      name: BUS- Leo Express Global a.s.
                      label: Leo Express Bus
                      spp: null
                    - id: 8
                      name: Erabus Ltd.
                      label: Erabus
                      spp: null
                    - id: 21
                      name: ERABUS
                      label: ERABUS
                      spp: null
                    - id: 23
                      name: Leo Express Slovensko s.r.o.
                      label: Leo Express SK
                      spp: null
                    - id: 24
                      name: Lux Express
                      label: Lux Express
                      spp: null
                    - id: 25
                      name: Transdev Slezsko a.s.
                      label: Transdev
                      spp: null
                    - id: 555
                      name: Leo Express Tenders s.r.o
                      label: Leo Express Tenders
                      spp: null
                    - id: 1224
                      name: Koleje Dolnośląskie
                      label: Koleje Dolnośląskie
                      spp: null

  /le#delays:
    post:
      tags:
        - Live Data
      summary: Live Train Positions
      operationId: delays
      description: |-
        Returns real-time positions of all active Leo Express trains/buses with GPS coordinates,
        speed, bearing, delay information, and current stop details.
      parameters:
        - $ref: '#/components/parameters/ContentType'
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: 'query delaysQuery($locale: String) { delays(locale: $locale) { line_short line_name ride_id from from_st to to_st conf conf_st lat lng gps_time speed bearing acceleration departure_delay delay reservation stops { station_id platform track } ride { stops { arrival departure station { id name } } } } }'
              variables:
                locale: de
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      delays:
                        type: array
                        items:
                          $ref: '#/components/schemas/DelayInfo'
  /le#minPrices:
    post:
      tags:
        - Pricing
      summary: Minimum Prices
      operationId: minPrices
      description: |-
        Returns the minimum price for each origin-destination pair across the entire network.
        Useful for displaying "from" prices on route overview pages.
      parameters:
        - $ref: '#/components/parameters/ContentType'
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: 'query minPricesQuery($currency: String, $locale: String, $token: String, $platform: String) { minPrices(currency: $currency, locale: $locale, token: $token, platform: $platform) { minPrices { from to { to price } } error { code message } } }'
              variables:
                currency: EUR
                locale: de
                token: null
                platform: null
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      minPrices:
                        type: object
                        properties:
                          minPrices:
                            type: array
                            items:
                              type: object
                              properties:
                                from:
                                  type: string
                                  description: Origin station ID
                                  example: '8010366'
                                to:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      to:
                                        type: string
                                        description: Destination station ID
                                        example: PRZEMYSL
                                      price:
                                        type: number
                                        description: Minimum price in requested currency
                                        example: 19.6
                          error:
                            $ref: '#/components/schemas/Error'
  /le#timeticketPrices:
    post:
      tags:
        - Pricing
      summary: Time Ticket Prices
      operationId: timeticketPrices
      description: |-
        Returns pricing for time-based tickets (passes) with validity periods, per-class pricing,
        and one-way prices. Uses a price hash to identify the route/configuration.
      parameters:
        - $ref: '#/components/parameters/ContentType'
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: 'query timeticketPricesQuery($priceHash: String, $token: String, $locale: String, $platform: String) { timeticketPrices(priceHash: $priceHash, token: $token, locale: $locale, platform: $platform) { error { code message } timeticketPrices { id name currency_id carriers validity tax country valid_from valid_to created_at updated_at deleted_at prices { id class_id price price_oneway } } } }'
              variables:
                priceHash: abc123def456
                locale: de
                token: null
                platform: null
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      timeticketPrices:
                        type: object
                        properties:
                          timeticketPrices:
                            type: array
                            items:
                              $ref: '#/components/schemas/TimeTicket'
                          error:
                            $ref: '#/components/schemas/Error'

  /le#carsWithFreeSeats:
    post:
      tags:
        - Seats
      summary: Seat Map
      operationId: carsWithFreeSeats
      description: |-
        Returns car layout and available seats for a specific ticket. Each car includes a base64-encoded
        SVG map (`car_map`) showing the physical layout, plus a list of free seats with their class and type.

        Car names like "RIC B4-1" indicate couchette cars on international night trains.
      parameters:
        - $ref: '#/components/parameters/ContentType'
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: 'query carsWithSeatsQuery($ticket_id: String, $timestamp: Int, $locale: String, $token: String, $platform: String) { carsWithFreeSeats(ticket_id: $ticket_id, timestamp: $timestamp, locale: $locale, token: $token, platform: $platform) { cars { id name map_id car_map short_name classes order free_seats { id name seat_info car_id seat_type class_id } seat_msg } error { code message } } }'
