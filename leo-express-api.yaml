      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: 'query creditExchangeRatesQuery($locale: String, $token: String, $platform: String) { creditExchangeRates(locale: $locale, token: $token, platform: $platform) { date currency_code currency_ratio } }'
              variables:
                locale: de
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      creditExchangeRates:
                        type: array
                        items:
                          type: object
                          properties:
                            date:
                              type: string
                              format: date
                              example: '2019-10-21'
                            currency_code:
                              type: string
                              enum: [CZK, EUR, PLN]
                              example: EUR
                            currency_ratio:
                              type: number
                              description: Credits per 1 unit of currency
                              example: 24
  /le#getApplicationData:
    post:
      tags:
        - Session
      summary: Get Application Data
      operationId: getApplicationData
      description: |-
        Returns internal API endpoints and the application token used for payment gateway calls.
        No variables required.
      parameters:
        - $ref: '#/components/parameters/ContentType'
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: 'query getApplicationDataQuery { getApplicationData { endpoint gpwebpay_endpoint gopay_endpoint payu_endpoint s24_endpoint application_token mallpay_endpoint } }'
              variables: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      getApplicationData:
                        type: object
                        properties:
                          endpoint:
                            type: string
                            description: Main API base URL
                            example: https://api.le.cz/api/v1
                          gpwebpay_endpoint:
                            type: string
                            example: https://api.le.cz/gates/gpgate/create.php
                          gopay_endpoint:
                            type: string
                            example: https://api.le.cz/gates/gopaygate/create.php
                          payu_endpoint:
                            type: string
                            example: https://api.le.cz/gates/payu/create.php
                          s24_endpoint:
                            type: string
                            example: https://api.le.cz/gates/servis24/create.php
                          application_token:
                            type: string
                            description: Token used for payment gateway mutations
                            example: symW412o-aS8g4
                          mallpay_endpoint:
                            type: string
                            example: https://api.le.cz/gates/mallpay/create.php
  /le#createGoPayPayment:
    post:
      tags:
        - Payment
      summary: Create GoPay Payment
      operationId: createGoPayPayment
      description: |-
        Initiates a payment via GoPay gateway. Returns a redirect URL to the payment form.
        Requires the `application_token` from `getApplicationData` as the `token` variable.

        Payment channels: `PAYMENT_CARD`, `BANK_ACCOUNT`, `APPLE_PAY`, `BITCOIN`, `google`
      parameters:
        - $ref: '#/components/parameters/ContentType'
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: 'mutation createGoPayPaymentMutation($order: String, $hash: String, $backUrl: String, $paymentChannel: String, $rebuy: Boolean, $locale: String, $token: String, $platform: String) { createGoPayPayment(order: $order, hash: $hash, backUrl: $backUrl, paymentChannel: $paymentChannel, rebuy: $rebuy, locale: $locale, token: $token, platform: $platform) { url error { code message } } }'
              variables:
                order: '43644629'
                hash: e74874df516074d4a07feeda265cbed6
                backUrl: https://www.leoexpress.com/de/bestellungreservierung?order=43644629&email=a.b%40c.de&orderDigest=TOKEN&registration=undefined
                paymentChannel: PAYMENT_CARD
                rebuy: false
                locale: de
                token: symW412o-aS8g4
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      createGoPayPayment:
                        type: object
                        properties:
                          url:
                            type: string
                            description: Redirect URL to GoPay payment form
                            example: https://gate.gopay.com/gw-ui/rest/v3/fc0c665c57351b80623c00748ec29600
                          error:
                            $ref: '#/components/schemas/Error'
  /api/payment/choose-method:
    post:
      tags:
        - Payment
      summary: Submit Passenger Details & Choose Payment
      operationId: paymentChooseMethod
      description: |-
        Submits passenger contact details (email, phone, name) and proceeds to payment step.
        Returns the order code. Must be called before initiating a payment gateway redirect.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  description: Passenger email for ticket delivery
                  example: passenger@example.com
                phone:
                  type: string
                  description: Optional phone number
                firstName:
                  type: string
                lastName:
                  type: string
                birthday:
                  type: string
                  description: Date of birth (optional)
                clubmember:
                  type: string
                  description: Leo Express club membership ID (or "undefined")
                bussinesTerms:
                  type: string
                  description: Terms acceptance flag
                postRideEvaluation:
                  type: string
                  description: Opt-in for post-ride evaluation emails
                  example: 'true'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  orderData:
                    type: string
                    description: Order code
                    example: '261158547117240'
                  clearCart:
                    type: boolean
                    example: false
                  error:
                    $ref: '#/components/schemas/Error'
  /api/user/check:
    post:
      tags:
        - Session
      summary: Check User for Order
      operationId: userCheck
      description: |-
        Verifies user association with an order using the order ID and digest token.
        Used on the confirmation/reservation page after payment redirect.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - order
                - orderDigest
              properties:
                order:
                  type: string
                  description: Order ID
                  example: '43644629'
                orderDigest:
                  type: string
                  description: Base64 digest token
                  example: cW8vY1crbnp4K0lubk9uaWlQMFFjbFRTM0ZvNXBVc2Y2ZGFFcnNWRDBhdz0=
                locale:
                  type: string
                  example: de
                user:
                  type: string
                  description: User ID (empty for guest)
                token:
                  type: string
                  description: Auth token (null for guest)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
  /api/co2/delete:
    post:
      tags:
        - Booking
      summary: Remove CO2 Compensation
      operationId: co2Delete
      description: Removes the optional CO2 compensation add-on from the current order.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                locale:
                  type: string
                  example: de
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object

components:
  parameters:
    ContentType:
      in: header
      name: Content-Type
      required: true
      schema:
        type: string
      example: application/json
    Origin:
      in: header
      name: Origin
      schema:
        type: string
      example: https://www.leoexpress.com
  schemas:
    GraphQLRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          description: GraphQL query or mutation string
        variables:
          type: object
          description: Variables for the GraphQL operation
    Error:
      type: object
      nullable: true
      properties:
        code:
          type: integer
          example: 404
        message:
          type: string
          example: No connections found
    Carrier:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Leo Express
        label:
          type: string
          example: Leo Express
        logo:
          type: string
          nullable: true
          description: Base64-encoded PNG carrier logo
        spp_file:
          type: string
          nullable: true
          description: SPP document file reference
        spp:
          type: string
          nullable: true
          description: Carrier legal entity / SPP description
          example: Leo Express Global a.s. / Leo Express s.r.o.
    Station:
      type: object
      properties:
        id:
          type: string
          description: Station ID (EVA number or internal code)
          example: '8010366'
        name:
          type: string
          example: Weimar
        name_master:
          type: string
          description: Master name (canonical, unlocalized)
          example: Weimar
        name_lng:
          type: string
          description: Localized name
          example: Weimar
        country:
          type: string
          description: ISO country code (lowercase)
          example: de
        gps_lat:
          type: string
          description: Latitude
          example: '50.979516'
        gps_lon:
          type: string
          description: Longitude
          example: '11.329819'
        type:
          type: string
          description: Station type
          enum: [station, bus]
          example: station
        timezone:
          type: string
          example: Europe/Berlin
        parent_station:
          type: object
          nullable: true
          description: Parent area/city grouping
          properties:
            short:
              type: string
            name:
              type: string
            country:
              type: string
            timezone:
              type: string
        priority:
          type: integer
          nullable: true
        deleted_at:
          type: integer
          nullable: true
        translations:
          type: array
          items:
            type: object
            properties:
              locale:
                type: string
                example: de
              name:
                type: string
                example: Weimar
    DateTimeInfo:
      type: object
      properties:
        date:
          type: string
          description: ISO 8601 datetime string
          example: '2026-08-08 18:39:00.000000'
        timezone_type:
          type: integer
          example: 3
        timezone:
          type: string
          example: Europe/Berlin
    SearchResults:
      type: object
      properties:
        return_msg:
          type: string
        search_msg:
          type: array
          nullable: true
          description: Informational messages about the search (e.g. disruptions, route notices)
          items:
            type: object
            properties:
              msg:
                type: string
                description: Message text
              icon:
                type: string
                nullable: true
              color_bg:
                type: string
                nullable: true
                description: Background color hex code
              color_bg_icon:
                type: string
                nullable: true
              station_from:
                $ref: '#/components/schemas/Station'
              station_to:
                $ref: '#/components/schemas/Station'
        return_code:
          type: integer
          example: 0
        date:
          type: string
          example: '08.08.2026'
        timestamp:
          type: integer
          example: 1784647696
        connections:
          type: array
          items:
            $ref: '#/components/schemas/Connection'
        error:
          $ref: '#/components/schemas/Error'
    Connection:
      type: object
      properties:
        origin:
          $ref: '#/components/schemas/Station'
        destination:
          $ref: '#/components/schemas/Station'
        departure:
          type: integer
          description: Departure as Unix timestamp
          example: 1723135140
        departure_time:
          $ref: '#/components/schemas/DateTimeInfo'
        arrival:
          type: integer
          description: Arrival as Unix timestamp
          example: 1723193820
        arrival_time:
          $ref: '#/components/schemas/DateTimeInfo'
        origin_country:
          type: string
          example: DE
        destination_country:
          type: string
          example: PL
        traveltime:
          type: integer
          description: Travel time in seconds
          example: 58680
        totaltime:
          type: integer
          description: Total time including transfers in seconds
          example: 58680
        distance:
          type: integer
          description: Distance in meters
          example: 1193000
        lines:
          type: array
          items:
            $ref: '#/components/schemas/Line'
        transfers:
          type: array
          items:
            $ref: '#/components/schemas/Transfer'
        classes:
          type: array
          description: Available travel classes for this connection
          items:
            $ref: '#/components/schemas/TravelClass'
        class_info:
          type: array
          items:
            $ref: '#/components/schemas/ClassInfo'
        top_combination:
          type: object
          description: Best price combination across lines
          properties:
            total:
              type: number
              example: 103.3
            basictotal:
              type: number
              example: 103.3
            lines:
              type: array
              items:
                type: object
                properties:
                  line:
                    type: string
                  class_id:
                    type: integer
                  short:
                    type: string
                  name:
                    type: string
        msg:
          type: string
          nullable: true
        currency:
          type: string
          example: EUR
        hash:
          type: string
          description: Connection hash used to create an order via /api/order/process-order
          example: c36bc540e222639be02de0ab08344c1f
        d2d_info:
          type: object
          nullable: true
          properties:
            dropoff:
              type: string
              nullable: true
            pickup:
              type: string
              nullable: true

    Line:
      type: object
      properties:
        line_id:
          type: string
          example: LE235
        origin:
          type: string
          description: Origin station ID for this leg
          example: '8010366'
        destination:
          type: string
          description: Destination station ID for this leg
          example: '5102825'
        departure:
          type: integer
          description: Departure Unix timestamp
          example: 1723135140
        arrival:
          type: integer
          description: Arrival Unix timestamp
          example: 1723193820
        departure_time:
          $ref: '#/components/schemas/DateTimeInfo'
        arrival_time:
          $ref: '#/components/schemas/DateTimeInfo'
        distance:
          type: integer
          description: Distance in meters
          example: 1193000
        type:
          type: string
          description: Transport type
          example: train
        ride_id:
          type: string
          example: '1081846'
        carrier_id:
          type: integer
          example: 1
        line_stops:
          type: array
          description: Intermediate stops on this line
          items:
            type: object
            properties:
              station:
                type: object
                properties:
                  name_master:
                    type: string
                    example: Leipzig Hbf (tief)
                  country:
                    type: string
                    example: DE
                  name:
                    type: string
                    example: Leipzig Hbf (tief)
                  translations:
                    type: array
                    items:
                      type: object
                      properties:
                        locale:
                          type: string
                        name:
                          type: string
        services:
          type: array
          description: Available services on this line (e.g. bicycle)
          items:
            type: object
            properties:
              count:
                type: integer
              capacity:
                type: integer
              price:
                type: number
              service_id:
                type: string
                description: 'Service ID (e.g. "4" = bicycle)'
                example: '4'
        info:
          type: object
          properties:
            facility:
              type: array
              items:
                type: object
                properties:
                  class_id:
                    type: integer
                  values:
                    type: array
                    items:
                      type: string
            delay:
              type: object
              nullable: true
              properties:
                delay:
                  type: integer
                  description: Delay in minutes
                last_seen:
                  type: string
                ride_id:
                  type: string
            notice:
              type: array
              items:
                type: object
                properties:
                  header:
                    type: string
                  message:
                    type: string
                  type:
                    type: string
                  type_id:
                    type: integer
                  from:
                    type: string
                  to:
                    type: string
                  show_date:
                    type: boolean
        classes:
          type: array
          items:
            $ref: '#/components/schemas/TravelClass'
        class_info:
          type: array
          items:
            $ref: '#/components/schemas/ClassInfo'
        line_obj:
          type: object
          properties:
            short:
              type: string
              example: LE235
            name:
              type: string
              example: LE235
            type:
              type: string
              example: train
            carrier_id:
              type: integer
              description: Carrier ID
              example: 1
            carrier:
              $ref: '#/components/schemas/Carrier'
            name_required:
              type: boolean
              description: Whether passenger names are required for this line
            transport_type:
              type: integer
              description: 'Transport type code (0=train, 1=bus, 2=minibus)'
            info:
              type: object
              nullable: true
              properties:
                facilities:
                  type: array
                  items:
                    type: object
                    properties:
                      class_id:
                        type: integer
                      values:
                        type: array
                        items:
                          type: integer
                name_required:
                  type: boolean
        scheme:
          type: string
          description: Car scheme identifier
          enum: [ric, flirt, talgo, lint-long, bus]
          example: ric
    Transfer:
      type: object
      properties:
        id:
          type: string
          nullable: true
        type:
          type: string
          example: walk
        subtype:
          type: string
          nullable: true
        time:
          type: integer
          description: Transfer time in minutes
          example: 10
        distance:
          type: integer
          nullable: true
          description: Transfer distance in meters
        station_from:
          $ref: '#/components/schemas/Station'
        station_to:
          $ref: '#/components/schemas/Station'
        line_from:
          type: string
        line_to:
          type: string
        area:
          type: object
          nullable: true
          description: Area/city the transfer takes place in
          properties:
            short:
              type: string
            name:
              type: string
            country:
              type: string
            timezone:
              type: string
    TravelClass:
      type: object
      description: |-
        Travel class definition. Known classes:
        - id:1, BUS = Business (FLIRT, RIC, Talgo)
        - id:2, PRE = Premium (FLIRT only, 6-seat quiet compartment)
        - id:3, ECO = Economy (all vehicle types)
        - id:4, ECOPLUS = Economy Plus (FLIRT only, ergonomic seats + included refreshments)
        - id:7, ECOSLEEPER = Economy Sleeper (RIC night train only)
        - id:8, ECOSLEEPERLADY = Economy Sleeper Lady (RIC night train only)
      properties:
        id:
          type: integer
          example: 3
        short:
          type: string
          example: ECO
        name:
          type: string
          example: Economy
        kontent_hashtag:
          type: string
          description: Content identifier for class-specific UI/info
          example: economy_train_ric
    ClassInfo:
      type: object
      properties:
        record_id:
          type: string
        capacity:
          type: integer
          description: Total capacity
        max_capacity:
          type: integer
          description: Maximum capacity (including standing)
        standing:
          type: integer
          description: Standing places available
        occupied:
          type: integer
          description: Currently occupied seats
        total:
          type: number
          description: Total price for all passengers
          example: 103.3
        basictotal:
          type: number
          description: Base total without discounts
          example: 103.3
        groupTotal:
          type: number
          nullable: true
        guaranted:
          type: boolean
          description: Whether seat is guaranteed
        co2:
          type: number
          description: CO2 emissions in kg
        cashback:
          type: number
          nullable: true
          description: Cashback amount in Leo Credits
        optimized:
          type: boolean
          nullable: true
          description: Whether this is an optimized price combination
        is_promo:
          type: boolean
          nullable: true
          description: Whether this is a promotional price
        rates:
          type: array
          items:
            type: object
            properties:
              record_id:
                type: string
              price:
                type: number
                description: Price per passenger
                example: 35.4
              basicprice:
                type: number
                example: 35.4
              groupPrice:
                type: number
                nullable: true
              count:
                type: integer
                description: Number of passengers at this rate
                example: 1
        passengers:
          type: array
          items:
            type: object

    DelayInfo:
      type: object
      properties:
        line_short:
          type: string
          example: LE235
        line_name:
          type: string
          example: LE235
        ride_id:
          type: string
          example: '1081846'
        from:
          type: string
          description: Origin station name
          example: Weimar
        from_st:
          type: string
          description: Origin station ID
          example: '8010366'
        to:
          type: string
          description: Destination station name
          example: Przemyśl Zasanie
        to_st:
          type: string
          description: Destination station ID
          example: '5102825'
        conf:
          type: string
          description: Confirmed next stop name
        conf_st:
          type: string
          description: Confirmed next stop ID
        lat:
          type: number
          format: double
          description: Current latitude
          example: 50.9795
        lng:
          type: number
          format: double
          description: Current longitude
          example: 11.3298
        gps_time:
          type: string
          description: GPS timestamp
        speed:
          type: number
          description: Current speed in km/h
          example: 120.5
        bearing:
          type: number
          description: Heading in degrees
          example: 90.0
        acceleration:
          type: number
          description: Acceleration
          example: 0.0
        departure_delay:
          type: integer
          description: Departure delay in minutes
          example: 0
        delay:
          type: integer
          description: Current delay in minutes
          example: 5
        reservation:
          type: boolean
        stops:
          type: array
          items:
            type: object
            properties:
              station_id:
                type: string
              platform:
                type: string
                nullable: true
              track:
                type: string
                nullable: true
        ride:
          type: object
          properties:
            stops:
              type: array
              items:
                type: object
                properties:
                  arrival:
                    type: string
                    description: Arrival time (HH:mm or datetime)
                  departure:
                    type: string
                    description: Departure time (HH:mm or datetime)
                  station:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
    Car:
      type: object
      properties:
        id:
          type: integer
          example: 161
        name:
          type: string
          description: 'Car name (e.g. "RIC B4-1" for couchette cars)'
          example: RIC B4-1
        map_id:
          type: integer
        car_map:
          type: string
          description: Base64-encoded SVG of the car layout
        short_name:
          type: string
          example: B4-1
        classes:
          type: array
          description: Class IDs available in this car
          items:
            type: integer
          example: [7, 8]
        order:
          type: integer
          description: Car order in the train
          example: 1
        free_seats:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                description: Seat ID for assignment
                example: 18928
              name:
                type: string
                description: Seat number/name
                example: '32'
              seat_info:
                type: string
                nullable: true
              car_id:
                type: integer
                example: 161
              seat_type:
                type: string
              class_id:
                type: integer
                description: Class this seat belongs to
                example: 7
        seat_msg:
          type: string
          nullable: true
    PaymentMethod:
      type: object
      properties:
        id:
          type: integer
          description: |-
            Payment method ID. Known values:
            - 32: Google Pay
            - 101: Bankomatkarte / PAYMENT_CARD
            - 134: Bank transfer / BANK_ACCOUNT
            - 143: Apple Pay
            - 144: Kryptowährungen / BITCOIN
          example: 101
        name_lng:
          type: string
          example: Bankomatkarte
        description_lng:
          type: string
        image:
          type: string
          description: URL or path to payment method icon
        subtype:
          type: string
          example: PAYMENT_CARD
        type:
          type: string
          example: card
        currency:
          type: string
          example: EUR
        amount:
          type: number
          description: Amount to pay with this method
          example: 103.3
        allow_combined:
          type: boolean
