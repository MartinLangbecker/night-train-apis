              variables:
                orderId: '43663293'
                digest: eTdxaEFFRmZZWHFzdDYxSGpiS3h3N29kcDhIK0Vqb1V1cVgzeUtCTm5WTT0=
                user: null
                token: null
                timestamp: 1753170000
                locale: de
                platform: null
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      orderData:
                        $ref: '#/components/schemas/OrderResponse'
